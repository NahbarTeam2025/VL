    <div id="gdpr-overlay" style="position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px);">

        <button id="accept-gdpr" style="background: #4FD1FF; color: black; border: none; padding: 14px 32px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; transition: transform 0.2s;">Alles akzeptieren</button>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      (function() {
        const overlay = document.getElementById('gdpr-overlay');
        const acceptBtn = document.getElementById('accept-gdpr');

        function activateSite() {
          overlay.style.display = 'none';
          
          // Inject Fonts
          const fontLink = document.createElement('link');
          fontLink.rel = 'stylesheet';
          fontLink.href = 'https://fonts.bunny.net/css2?family=Inter:wght@300;400;500;600;700;900&family=Mrs+Saint+Delafield&text=Robert%20Erbach&display=swap&subset=latin';
          document.head.appendChild(fontLink);

          // Swap data-src for images
          document.querySelectorAll('img[data-src]').forEach(img => {
            img.src = img.getAttribute('data-src');
          });

          // Dispatch event for React to mount
          window.dispatchEvent(new Event('GDPR_CONSENT_GIVEN'));
        }

        if (localStorage.getItem('gdpr_accepted') === 'true') {
          // If already accepted, we still need to inject fonts/images, 
          // but we might run before React or after. 
          // React will check localStorage itself, but we need to handle the non-React parts.
          activateSite();
        } else {
          acceptBtn.addEventListener('click', () => {
            localStorage.setItem('gdpr_accepted', 'true');
            activateSite();
          });
        }
      })();
    </script>
